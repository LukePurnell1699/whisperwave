<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — WhisperWave</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f5efe6; --blush: #e8c9b0; --amber: #c8894a; --ember: #9b5a2a;
    --velvet: #1a0f0a; --smoke: #2e1c14;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Jost', sans-serif; background: var(--velvet); color: var(--cream); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }
  body::after { content:''; position:fixed; width:900px; height:900px; background:radial-gradient(ellipse, rgba(155,90,42,0.15) 0%, transparent 70%); top:-200px; left:50%; transform:translateX(-50%); pointer-events:none; z-index:0; animation:breathe 8s ease-in-out infinite; }
  @keyframes breathe { 0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)} 50%{opacity:1;transform:translateX(-50%) scale(1.08)} }

  .card { position:relative; z-index:1; width:100%; max-width:420px; padding:2rem; }

  .logo { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.6rem; letter-spacing:0.12em; color:var(--cream); text-decoration:none; display:block; text-align:center; margin-bottom:2.5rem; }
  .logo span { color:var(--amber); font-style:italic; }

  .tabs { display:flex; border-bottom:1px solid rgba(245,239,230,0.08); margin-bottom:2rem; }
  .tab { flex:1; padding:0.8rem; font-size:0.68rem; font-weight:300; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,239,230,0.35); background:transparent; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.25s; }
  .tab.active { color:var(--cream); border-bottom-color:var(--amber); }

  .form-box { background:rgba(46,28,20,0.5); border:1px solid rgba(245,239,230,0.07); border-radius:8px; padding:2rem; }
  .form-group { margin-bottom:1.2rem; }
  .form-group label { font-size:0.62rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(245,239,230,0.35); display:block; margin-bottom:0.55rem; }
  .form-input { width:100%; background:rgba(245,239,230,0.04); border:1px solid rgba(245,239,230,0.09); border-radius:4px; padding:0.75rem 1rem; font-family:'Jost',sans-serif; font-size:0.84rem; font-weight:200; color:var(--cream); outline:none; transition:border-color 0.25s; }
  .form-input::placeholder { color:rgba(245,239,230,0.2); }
  .form-input:focus { border-color:rgba(200,137,74,0.4); }

  .btn-submit { width:100%; background:var(--amber); color:var(--velvet); font-family:'Jost',sans-serif; font-size:0.78rem; font-weight:400; letter-spacing:0.22em; text-transform:uppercase; border:none; padding:1rem; border-radius:3rem; cursor:pointer; transition:all 0.4s; margin-top:0.5rem; }
  .btn-submit:hover { background:var(--blush); transform:translateY(-1px); }
  .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(245,239,230,0.08); }
  .divider span { font-size:0.62rem; color:rgba(245,239,230,0.25); letter-spacing:0.1em; }

  .msg { font-size:0.76rem; font-weight:200; padding:0.75rem 1rem; border-radius:4px; margin-bottom:1rem; display:none; }
  .msg.error { background:rgba(224,85,85,0.1); border:1px solid rgba(224,85,85,0.25); color:rgba(255,160,160,0.9); display:block; }
  .msg.success { background:rgba(100,200,130,0.1); border:1px solid rgba(100,200,130,0.25); color:rgba(160,240,180,0.9); display:block; }

  .footer-note { text-align:center; margin-top:1.5rem; font-size:0.68rem; color:rgba(245,239,230,0.25); line-height:1.7; }
  .footer-note a { color:rgba(200,137,74,0.6); text-decoration:none; }
  .footer-note a:hover { color:var(--amber); }

  .back-link { display:block; text-align:center; margin-bottom:1.5rem; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; color:rgba(245,239,230,0.3); text-decoration:none; transition:color 0.3s; }
  .back-link:hover { color:rgba(245,239,230,0.6); }

  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:var(--velvet)} ::-webkit-scrollbar-thumb{background:rgba(200,137,74,0.3);border-radius:2px}
</style>
</head>
<body>

<div class="card">
  <a href="index.html" class="logo">Whisper<span>Wave</span></a>
  <a href="index.html" class="back-link">← Back to home</a>

  <div class="form-box">
    <div class="tabs">
      <button class="tab active" onclick="showTab('signin', this)">Sign In</button>
      <button class="tab" onclick="showTab('signup', this)">Create Account</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- SIGN IN -->
    <div id="signinForm">
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" id="signinEmail" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" id="signinPassword" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <button class="btn-submit" id="signinBtn" onclick="signIn()">Sign In</button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="#" onclick="showForgot()" style="font-size:0.65rem;color:rgba(200,137,74,0.5);text-decoration:none;">Forgot password?</a>
      </div>
    </div>

    <!-- SIGN UP -->
    <div id="signupForm" style="display:none">
      <div class="form-group">
        <label>Your name</label>
        <input class="form-input" id="signupName" type="text" placeholder="First name">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" id="signupEmail" type="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input class="form-input" id="signupPassword" type="password" placeholder="At least 8 characters" onkeydown="if(event.key==='Enter')signUp()">
      </div>
      <button class="btn-submit" id="signupBtn" onclick="signUp()">Create Account — It's Free</button>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotForm" style="display:none">
      <p style="font-size:0.78rem;font-weight:200;color:rgba(245,239,230,0.45);margin-bottom:1.2rem;line-height:1.7;">Enter your email and we'll send you a reset link.</p>
      <div class="form-group">
        <label>Email address</label>
        <input class="form-input" id="forgotEmail" type="email" placeholder="you@example.com">
      </div>
      <button class="btn-submit" onclick="sendReset()">Send Reset Link</button>
      <div style="text-align:center;margin-top:1rem;">
        <a href="#" onclick="showTab('signin',null)" style="font-size:0.65rem;color:rgba(200,137,74,0.5);text-decoration:none;">← Back to sign in</a>
      </div>
    </div>

  </div>

  <div class="footer-note">
    By signing in you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://okcpubrjmsgmvlbyofdh.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_vVXeAl-vesP5tYVvs3msHQ_68dKCQrp';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, redirect to browse
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'browse.html';
  });

  function showTab(name, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    if (btn) btn.classList.add('active');
    document.getElementById('signinForm').style.display = name === 'signin' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = name === 'signup' ? 'block' : 'none';
    document.getElementById('forgotForm').style.display = name === 'forgot' ? 'block' : 'none';
    clearMsg();
  }

  function showForgot() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('signinForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('forgotForm').style.display = 'block';
    clearMsg();
  }

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text;
    box.className = 'msg ' + type;
  }

  function clearMsg() {
    const box = document.getElementById('msgBox');
    box.className = 'msg';
    box.textContent = '';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
  }

  // Store button labels
  document.getElementById('signinBtn').dataset.label = 'Sign In';
  document.getElementById('signupBtn').dataset.label = 'Create Account — It\'s Free';

  async function signIn() {
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;
    if (!email || !password) return showMsg('Please fill in all fields.', 'error');

    setLoading('signinBtn', true);
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    setLoading('signinBtn', false);

    if (error) {
      showMsg(error.message, 'error');
    } else {
      showMsg('Signed in! Taking you to WhisperWave…', 'success');
      setTimeout(() => window.location.href = 'browse.html', 1200);
    }
  }

  async function signUp() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!name || !email || !password) return showMsg('Please fill in all fields.', 'error');
    if (password.length < 8) return showMsg('Password must be at least 8 characters.', 'error');

    setLoading('signupBtn', true);
    const { error } = await supabase.auth.signUp({
      email, password,
      options: { data: { full_name: name } }
    });
    setLoading('signupBtn', false);

    if (error) {
      showMsg(error.message, 'error');
    } else {
      showMsg('Account created! Check your email to confirm, then sign in.', 'success');
    }
  }

  async function sendReset() {
    const email = document.getElementById('forgotEmail').value.trim();
    if (!email) return showMsg('Please enter your email.', 'error');

    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });

    if (error) {
      showMsg(error.message, 'error');
    } else {
      showMsg('Reset link sent! Check your inbox.', 'success');
    }
  }
</script>
</body>
</html>
